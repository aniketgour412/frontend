<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelVerse - Passenger Details</title>

  <style>
    /* ============================================================
       1. GLOBAL SETTINGS
    ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      color: #333333;
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-pad {
      padding: 60px 0;
    }

    .section-title {
      text-align: center;
      font-size: 32px;
      margin-bottom: 40px;
      color: #0056b3;
    }

    .btn {
      display: inline-block;
      background-color: #0056b3;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      text-align: center;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: #004494;
    }

    /* ============================================================
       2. NAVBAR & FOOTER
    ============================================================ */
    .navbar {
      background-color: white;
      border-bottom: 2px solid #eeeeee;
      padding: 15px 0;
    }

    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #0056b3;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      font-size: 16px;
      font-weight: bold;
    }

    .nav-links a:hover {
      color: #0056b3;
    }

    .footer {
      background-color: #333333;
      color: white;
      padding: 40px 0;
      text-align: center;
      margin-top: 40px;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 30px;
      margin-bottom: 30px;
      text-align: left;
    }

    .footer h3 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #0056b3;
    }

    .footer p,
    .footer-links a {
      font-size: 14px;
      color: #aaaaaa;
    }

    .footer-links {
      list-style: none;
    }

    .footer-links li {
      margin-bottom: 8px;
    }

    .copyright {
      border-top: 1px solid #555;
      padding-top: 20px;
      font-size: 12px;
      color: #888;
    }

    /* ============================================================
       3. DETAILS FORM
    ============================================================ */
    .booking-form-box {
      background-color: white;
      padding: 40px;
      border: 1px solid #ddd;
      border-radius: 8px;
      max-width: 700px;
      margin: 0 auto;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .row-3-cols {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      grid-column: span 2;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full-width {
      grid-column: span 2;
    }

    .form-group label {
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 14px;
      color: #555;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
    }

    .form-group textarea {
      resize: vertical;
      height: 100px;
    }

    /* Small stepper UI */
    .stepper {
      text-align: center;
      margin-bottom: 30px;
      font-weight: bold;
      color: #666;
    }

    .stepper span {
      background: #0056b3;
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      margin: 0 5px;
    }

    /* ============================================================
       UI IMPROVEMENTS & ANIMATIONS
    ============================================================ */
    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    body {
      animation: fadeIn 0.6s ease-out forwards;
    }

    .booking-form-box {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .booking-form-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
    }

    .btn {
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 10px rgba(0, 86, 179, 0.3);
    }

    .pkg-alert {
      display: none;
      padding: 15px;
      background: #e9ecef;
      margin-bottom: 25px;
      font-weight: bold;
      border-left: 4px solid #0056b3;
      border-radius: 4px;
    }

    #3days:target~.section-pad #alert-3days {
      display: block;
    }

    #5days:target~.section-pad #alert-5days {
      display: block;
    }

    #7days:target~.section-pad #alert-7days {
      display: block;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container nav-container">
      <div class="logo">TravelVerse</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      </ul>
    </div>
  </nav>

  <!-- Anchors for pure CSS state management -->
  <span id="3days"></span>
  <span id="5days"></span>
  <span id="7days"></span>

  <!-- Step 2: User Details Form -->
  <section class="section-pad">
    <div class="container">

      <div class="stepper">
        Step 1 > <span>Step 2: Details</span> > Step 3 > Step 4 > Done
      </div>

      <h2 class="section-title">Passenger Details</h2>

      <div class="booking-form-box">
        <!-- Dynamic Package Notifications driven by CSS -->
        <div id="alert-3days" class="pkg-alert">Selected Package: 3 Days Basic</div>
        <div id="alert-5days" class="pkg-alert">Selected Package: 5 Days Standard</div>
        <div id="alert-7days" class="pkg-alert">Selected Package: 7 Days Premium</div>

        <!-- We don't use <form action="..."> since we rely on anchor links to "submit" without JS -->
        <div class="form-grid">

          <div class="row-3-cols">
            <div class="form-group">
              <label>From City</label>
              <select>
                <option value="" disabled selected>Select starting city...</option>
                <option>Delhi</option>
                <option>Mumbai</option>
                <option>Ahmedabad</option>
                <option>Kolkata</option>
                <option>Bangalore</option>
                <option>Chennai</option>
              </select>
            </div>

            <div class="form-group">
              <label>To City (Destination)</label>
              <select>
                <option value="" disabled selected>Select destination...</option>
                <option>Goa</option>
                <option>Manali</option>
                <option>Dubai</option>
                <option>Singapore</option>
                <option>Maldives</option>
                <option>Bali</option>
              </select>
            </div>

            <div class="form-group">
              <label>Travel Date</label>
              <input type="date">
            </div>
          </div>

          <div class="form-group full-width">
            <label>Full Name</label>
            <input type="text" placeholder="John Doe">
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="john@example.com">
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="+91 90000 00000">
          </div>

          <div class="form-group">
            <label>Gender</label>
            <select>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label>Number of Travelers</label>
            <select>
              <option>1 Adult</option>
              <option>2 Adults</option>
              <option>Family (2 Adults, 2 Kids)</option>
              <option>Group (4+)</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label>Home Address</label>
            <textarea placeholder="Enter your full residential address..."></textarea>
          </div>

        </div>

        <a href="summary.html" class="btn" style="display: block; text-align: center; margin-top: 10px;">Next Step →</a>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-grid">

        <div>
          <h3>Contact Detail</h3>
          <p>Email: contact@travelverse.edu</p>
        </div>
      </div>
      <div class="copyright">&copy; 2026 TravelVerse.</div>
    </div>
  </footer>

</body>

</html>
